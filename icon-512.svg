<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0E07"/>
      <stop offset="100%" stop-color="#0C0907"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4913F"/>
      <stop offset="100%" stop-color="#9B5B2D"/>
    </linearGradient>
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F0E6D6" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#F0E6D6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- V60 cone -->
  <path d="M150 140 L256 380 L362 140" fill="none" stroke="url(#cup)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
