  <line x1="178" y1="180" x2="226" y2="320" stroke="#D4913F" stroke-width="4" opacity=".35"/>
  <line x1="210" y1="160" x2="240" y2="340" stroke="#D4913F" stroke-width="4" opacity=".3"/>
  <line x1="256" y1="148" x2="256" y2="372" stroke="#D4913F" stroke-width="4" opacity=".35"/>
  <line x1="302" y1="160" x2="272" y2="340" stroke="#D4913F" stroke-width="4" opacity=".3"/>
  <line x1="334" y1="180" x2="286" y2="320" stroke="#D4913F" stroke-width="4" opacity=".35"/>
  <!-- Steam lines -->
  <path d="M216 126 Q216 100 228 80 Q240 60 228 40" fill="none" stroke="url(#steam)" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 118 Q256 88 268 68 Q280 48 268 24" fill="none" stroke="url(#steam)" stroke-width="7" stroke-linecap="round"/>
  <path d="M296 126 Q296 100 308 80 Q320 60 308 40" fill="none" stroke="url(#steam)" stroke-width="6" stroke-linecap="round"/>
  <!-- Server/carafe below -->
  <path d="M188 384 L188 410 Q188 430 208 430 L304 430 Q324 430 324 410 L324 384" fill="#5D3019" opacity=".8"/>
